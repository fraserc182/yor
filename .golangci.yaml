version: "2"

run:
  concurrency: 8
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - unconvert
    - unparam
    - revive
  exclusions:
    paths:
      - "tests/yor_plugins"

formatters:
  enable:
    - gofmt
    - goimports
