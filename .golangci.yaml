version: "2"

run:
  concurrency: 8
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - unconvert
    - unparam
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - "tests/yor_plugins"
    rules:
      # Ignore unchecked errors in test cleanup (defer os.RemoveAll, os.Unsetenv, etc.)
      - linters: [errcheck]
        path: "_test\\.go"

formatters:
  enable:
    - gofmt
    - goimports
